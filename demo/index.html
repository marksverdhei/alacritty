<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alacritty Web Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1d1f21;
            color: #c5c8c6;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #status-bar {
            height: 32px;
            background: #282a2e;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 13px;
            border-bottom: 1px solid #373b41;
            flex-shrink: 0;
        }

        #status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #969896;
            transition: background 0.3s;
        }

        #status-indicator.connected {
            background: #b5bd68;
        }

        #status-indicator.error {
            background: #cc6666;
        }

        #status-text {
            color: #969896;
        }

        #terminal-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #terminal-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #connect-form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #282a2e;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #373b41;
            text-align: center;
        }

        #connect-form h2 {
            margin-bottom: 16px;
            font-weight: 400;
            font-size: 18px;
        }

        #connect-form input {
            background: #1d1f21;
            border: 1px solid #373b41;
            color: #c5c8c6;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            width: 300px;
            margin-bottom: 12px;
        }

        #connect-form button {
            background: #373b41;
            color: #c5c8c6;
            border: 1px solid #4d5057;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #connect-form button:hover {
            background: #4d5057;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <div id="status-indicator"></div>
        <span id="status-text">Disconnected</span>
    </div>

    <div id="terminal-container">
        <canvas id="terminal-canvas" tabindex="0"></canvas>

        <div id="connect-form">
            <h2>Alacritty Web Terminal</h2>
            <div>
                <input type="text" id="ws-url" value="ws://127.0.0.1:7681" placeholder="WebSocket URL">
            </div>
            <button id="connect-btn">Connect</button>
        </div>
    </div>

    <script type="module">
        import init, { AlacrittyTerminal } from './pkg/alacritty_web.js';

        let terminal = null;
        const canvas = document.getElementById('terminal-canvas');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const connectForm = document.getElementById('connect-form');
        const connectBtn = document.getElementById('connect-btn');
        const wsUrlInput = document.getElementById('ws-url');

        function setStatus(state, text) {
            statusIndicator.className = state;
            statusText.textContent = text;
        }

        async function start() {
            // Initialize WASM module.
            await init();

            // Create terminal (Canvas 2D renderer initializes synchronously).
            try {
                terminal = new AlacrittyTerminal(canvas);
                setStatus('', 'Ready - enter URL and connect');
            } catch (e) {
                setStatus('error', 'Init failed: ' + e.message);
                console.error('Init failed:', e);
            }
        }

        connectBtn.addEventListener('click', () => {
            const url = wsUrlInput.value.trim();
            if (!url || !terminal) return;

            try {
                terminal.connect(url);
                connectForm.style.display = 'none';
                setStatus('connected', 'Connected to ' + url);
                canvas.focus();
            } catch (e) {
                setStatus('error', 'Connection failed: ' + e.message);
            }
        });

        wsUrlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') connectBtn.click();
        });

        // Keyboard input -> terminal.
        canvas.addEventListener('keydown', (e) => {
            if (!terminal) return;

            // Map key events to terminal byte sequences.
            let bytes = null;

            if (e.ctrlKey && e.key.length === 1) {
                // Ctrl+letter -> control character.
                const code = e.key.toUpperCase().charCodeAt(0) - 64;
                if (code >= 0 && code <= 31) {
                    bytes = new Uint8Array([code]);
                }
            } else if (e.key === 'Enter') {
                bytes = new Uint8Array([13]);
            } else if (e.key === 'Backspace') {
                bytes = new Uint8Array([127]);
            } else if (e.key === 'Tab') {
                bytes = new Uint8Array([9]);
            } else if (e.key === 'Escape') {
                bytes = new Uint8Array([27]);
            } else if (e.key === 'ArrowUp') {
                bytes = new Uint8Array([27, 91, 65]);
            } else if (e.key === 'ArrowDown') {
                bytes = new Uint8Array([27, 91, 66]);
            } else if (e.key === 'ArrowRight') {
                bytes = new Uint8Array([27, 91, 67]);
            } else if (e.key === 'ArrowLeft') {
                bytes = new Uint8Array([27, 91, 68]);
            } else if (e.key === 'Home') {
                bytes = new Uint8Array([27, 91, 72]);
            } else if (e.key === 'End') {
                bytes = new Uint8Array([27, 91, 70]);
            } else if (e.key === 'Delete') {
                bytes = new Uint8Array([27, 91, 51, 126]);
            } else if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                // Regular character input.
                const encoded = new TextEncoder().encode(e.key);
                bytes = encoded;
            } else if (e.altKey && e.key.length === 1) {
                // Alt+key -> ESC + key.
                const encoded = new TextEncoder().encode(e.key);
                bytes = new Uint8Array([27, ...encoded]);
            }

            if (bytes) {
                e.preventDefault();
                terminal.write(bytes);
            }
        });

        // Handle canvas resize.
        const resizeObserver = new ResizeObserver((entries) => {
            if (!terminal) return;
            const cellW = terminal.cell_width();
            const cellH = terminal.cell_height();
            if (cellW <= 0 || cellH <= 0) return;

            for (const entry of entries) {
                const { width, height } = entry.contentRect;
                const cols = Math.floor(width / cellW);
                const rows = Math.floor(height / cellH);
                if (cols > 0 && rows > 0) {
                    terminal.resize(cols, rows);
                    console.log(`Resized to ${cols}x${rows} (${width}x${height}px)`);
                }
            }
        });
        resizeObserver.observe(canvas);

        // Start.
        start().catch(console.error);
    </script>
</body>
</html>
